name: Encoding Guard

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

jobs:
  encoding-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: wellnessbox
          POSTGRES_PASSWORD: wellnessbox
          POSTGRES_DB: wellnessbox
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U wellnessbox"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run encoding audit
        run: npm run audit:encoding

      - name: Verify R&D profile adapter contract
        run: npm run qa:rnd:profile-adapter

      - name: Verify R&D timeout retry circuit and fallback contract
        run: node --conditions=react-server --import tsx scripts/qa/check-rnd-resilience-contract.cts

      - name: Verify R&D OpenAPI and TypeScript operation contract
        run: node --conditions=react-server --import tsx scripts/qa/check-rnd-openapi-contract.cts

      - name: Verify R&D recommendation fail-closed contract
        run: npm run qa:rnd:preview-route

      - name: Verify R&D health alias
        run: npm run qa:rnd:health-alias

      - name: Verify TIPS final safety authority wiring
        run: npm run qa:tips:interim

      - name: Verify TIPS final safety authority behavior
        run: npm run qa:rnd:interim-safety-authority

      - name: Verify R&D ingredient identifier map
        run: npm run qa:rnd:ingredient-map

      - name: Verify R&D service product candidates
        run: npm run qa:rnd:product-candidates

      - name: Typecheck application
        run: npm run typecheck

      - name: Generate ephemeral build push keys
        run: >-
          node -e "const k=require('web-push').generateVAPIDKeys();
          console.log('NEXT_PUBLIC_VAPID_PUBLIC_KEY='+k.publicKey+'\nVAPID_PRIVATE_KEY='+k.privateKey)"
          >> "$GITHUB_ENV"

      - name: Initialize build database schema
        env:
          DATABASE_URL: postgresql://wellnessbox:wellnessbox@127.0.0.1:5432/wellnessbox
          DIRECT_URL: postgresql://wellnessbox:wellnessbox@127.0.0.1:5432/wellnessbox
          WELLNESSBOX_PRISMA_URL: postgresql://wellnessbox:wellnessbox@127.0.0.1:5432/wellnessbox
          WELLNESSBOX_URL_NON_POOLING: postgresql://wellnessbox:wellnessbox@127.0.0.1:5432/wellnessbox
        run: >-
          docker exec ${{ job.services.postgres.id }}
          psql -U wellnessbox -d wellnessbox
          -c 'CREATE EXTENSION IF NOT EXISTS vector'
          && npx prisma db push --skip-generate

      - name: Build production application
        env:
          DATABASE_URL: postgresql://wellnessbox:wellnessbox@127.0.0.1:5432/wellnessbox
          DIRECT_URL: postgresql://wellnessbox:wellnessbox@127.0.0.1:5432/wellnessbox
          WELLNESSBOX_PRISMA_URL: postgresql://wellnessbox:wellnessbox@127.0.0.1:5432/wellnessbox
          WELLNESSBOX_URL_NON_POOLING: postgresql://wellnessbox:wellnessbox@127.0.0.1:5432/wellnessbox
          GMAIL_SMTP_USER: build-only@example.invalid
          GMAIL_SMTP_APP_PASSWORD: build-only-not-a-credential
          GMAIL_SMTP_FROM: build-only@example.invalid
          SOLAPI_KEY: build-only-solapi-key
          SOLAPI_SECRET: build-only-solapi-secret
          SOLAPI_SENDER: "01000000000"
          JWT_SECRET: build-only-jwt-secret-at-least-32-bytes
          COOKIE_PASSWORD: build-only-cookie-password-at-least-32-bytes
          OTP_PEPPER: build-only-otp-pepper-at-least-32-bytes
          CRON_SECRET: build-only-cron-secret-at-least-32-bytes
          ADMIN_PASSWORD: build-only-admin-password
          TEST_PASSWORD: build-only-test-password
        run: npm run build
